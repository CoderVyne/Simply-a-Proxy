<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simply — Private Proxy Browser</title>
    <meta name="description" content="A minimalist, high-performance proxy browser with stealth cloaking, custom themes, and built-in privacy features.">
    <meta name="keywords" content="proxy, browser, unblock, privacy, stealth, scramjet, web proxy">
    <meta name="author" content="Simply Team">

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://simply-a-proxy.onrender.com/">
    <meta property="og:title" content="Simply — Private Proxy Browser">
    <meta property="og:description" content="Minimalist browsing with maximum privacy. Stealth mode, custom themes, and high-speed proxying.">
    <meta property="og:image" content="https://i.ibb.co/nN1gGm2j/favicon-1.png">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="stylesheet" href="/style.css">
    <script src="/scram/scramjet.all.js"></script>
    <script src="/baremux/index.js"></script>
    <script src="/main.js" defer></script>
</head>
<body>
    <canvas id="dot-grid"></canvas>

    <div id="status-badge">
        <span id="badge-time">00:00</span>
        <span class="badge-sep">|</span>
        <i class="ti ti-battery-4" id="battery-icon"></i>
        <span id="badge-battery">100%</span>
    </div>
    
    <nav class="top-nav">
        <div class="nav-container">
            <button id="home-btn" title="Home"><i class="ti ti-home"></i></button>
            <input type="text" id="top-url-input" value="simply://home" spellcheck="false">
            <button id="bookmark-btn" title="Bookmark"><i class="ti ti-star"></i></button>
        </div>
        <button id="nav-toggle" title="Toggle Navigation"><i class="ti ti-chevron-up"></i></button>
    </nav>
    
    <div class="bottom-controls">
        <button id="history-toggle" title="History"><i class="ti ti-history"></i></button>
        <button id="bookmarks-toggle" title="Bookmarks"><i class="ti ti-bookmarks"></i></button>
        <button id="settings-toggle" title="Settings"><i class="ti ti-settings"></i></button>
    </div>
    
    <div id="history-overlay" class="hidden overlay">
        <div class="overlay-content">
            <div class="overlay-header">
                <h2>Search History</h2>
                <button class="close-btn" data-overlay="history-overlay"><i class="ti ti-x"></i></button>
            </div>
            <div id="history-list"></div>
        </div>
    </div>

    <div id="bookmarks-overlay" class="hidden overlay">
        <div class="overlay-content">
            <div class="overlay-header">
                <h2>Bookmarks</h2>
                <button class="close-btn" data-overlay="bookmarks-overlay"><i class="ti ti-x"></i></button>
            </div>
            <div id="bookmarks-list"></div>
        </div>
    </div>

    <div id="settings-overlay" class="hidden overlay">
        <div class="overlay-content">
            <div class="overlay-header">
                <h2>Settings</h2>
                <button class="close-btn" data-overlay="settings-overlay"><i class="ti ti-x"></i></button>
            </div>
            <div class="setting-item">
                <label>Search Engine</label>
                <div class="search-engines">
                    <div class="engine-option" data-engine="google">
                        <img src="google.ico" alt="Google">
                        <span>Google</span>
                    </div>
                    <div class="engine-option active" data-engine="duckduckgo">
                        <img src="ddg.png" alt="DuckDuckGo">
                        <span>DuckDuckGo</span>
                    </div>
                </div>
            </div>

            <div class="setting-item">
                <label>Theme</label>
                <div class="theme-options">
                    <div class="theme-option active" data-theme="midnight"><span>Midnight</span></div>
                    <div class="theme-option" data-theme="slate"><span>Slate</span></div>
                    <div class="theme-option" data-theme="deepsea"><span>Deep Sea</span></div>
                </div>
            </div>

            <div class="setting-item">
                <label>Privacy</label>
                <div class="toggle-row">
                    <span>About:Blank Cloaking</span>
                    <label class="switch">
                        <input type="checkbox" id="cloak-toggle">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="toggle-row">
                    <span>Ad-Blocker</span>
                    <label class="switch">
                        <input type="checkbox" id="adblock-toggle" checked>
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="toggle-row">
                    <span>Forced Dark Mode</span>
                    <label class="switch">
                        <input type="checkbox" id="darkmode-toggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <div class="content" id="home-view">
        <h1>Simply.</h1>
        <form id="proxy-form">
            <input type="text" id="url-input" placeholder="Search the web freely..." autocomplete="off">
            <button type="submit"><i class="ti ti-arrow-right"></i></button>
        </form>
        <div id="speed-dial">
            <div class="dial-item" data-url="https://youtube.com"><i class="ti ti-brand-youtube"></i><span>YouTube</span></div>
            <div class="dial-item" data-url="https://discord.com"><i class="ti ti-brand-discord"></i><span>Discord</span></div>
            <div class="dial-item" data-url="https://google.com"><i class="ti ti-brand-google"></i><span>Google</span></div>
            <div class="dial-item" data-url="https://github.com"><i class="ti ti-brand-github"></i><span>GitHub</span></div>
        </div>
        <div id="error-msg"></div>
    </div>

    <div id="proxy-container" class="hidden">
        <iframe id="proxy-frame"></iframe>
    </div>
</body>
</html>
